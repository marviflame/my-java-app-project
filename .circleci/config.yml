
version: 2.1

jobs:
  compile_maven:
    docker:
      - image: cimg/base:java-17-alpine
    working_directory: ~/my-java-app-project
    steps:
      - checkout
      - restore_cache:
          keys:
            - maven-cache-{{ checksum "pom.xml" }}
            - maven-deps-

      - run:
          name: "Build With Maven"
          command: "maven clean compile!"

      - save_cache:
          paths:
            - ~/.m2
          key: maven-deps-{{ checksum "pom.xml" }}
workflows:
  say-hello-workflow: 
    jobs:
      - compile_maven
